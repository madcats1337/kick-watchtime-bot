[tool.black]
line-length = 120
target-version = ['py312']
include = '\.pyi?$'
extend-exclude = '''
/(
    \.git
    | \.venv
    | venv
    | __pycache__
    | docs
)/
'''

[tool.isort]
profile = "black"
line_length = 120
skip = [".git", ".venv", "venv", "__pycache__"]

[tool.bandit]
exclude_dirs = ["tests", "venv", ".venv", "scripts"]
skips = ["B101", "B311", "B110", "B105", "B113", "B324", "B608", "B104", "B108", "B404", "B603", "B606", "B607"]
# B101: assert, B311: random, B110: try-except-pass, B105: hardcoded password
# B113: requests without timeout, B324: weak hash, B608: SQL f-strings
# B104: bind all interfaces, B108: tmp directory, B404/B603/B606/B607: subprocess
# NOTE: re-enabling B105/B608 is deferred - see SECURITY_BACKLOG.md. All current
# dynamic SQL uses hardcoded/closed-set identifiers with bound params (no injection
# reachable), so every B608 hit is a false positive and every B105 hit is a URL.

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
addopts = "-v --tb=short"
